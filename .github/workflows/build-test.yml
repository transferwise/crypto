name: "Build & Test"

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - '*'

jobs:

  build-and-test:
    name: "Build & Test"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout git repo"
        uses: actions/checkout@v6
      - name: "Setup go"
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: "Dependencies"
        run: go mod download
      - name: "Build and run tests"
        run: make all